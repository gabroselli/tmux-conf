set -g mouse on
set -g default-terminal "tmux-256color"

set -g history-limit 300000
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

setw -g mode-keys vi

bind P paste-buffer
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'r' send-keys -X rectangle-toggle

set -g status-interval 5
set -g clock-mode-style 24

# Catppuccin Frappé
set -g status-style "bg=#303446,fg=#c6d0f5"
set -g status-position bottom
set -g status-justify left

set -g pane-border-style "fg=#51576d"
set -g pane-active-border-style "fg=#ca9ee6"

# Left: [mauve] session name [powerline arrow → base]
set -g status-left "#[bg=#ca9ee6,fg=#303446,bold] #S #[bg=#303446,fg=#ca9ee6,nobold]"
set -g status-left-length 40

# Windows
set -g window-status-separator ""
set -g window-status-format " #[fg=#b5bfe2]#I:#W "
set -g window-status-current-format "#[fg=#8caaee,bg=#303446]#[bg=#8caaee,fg=#303446,bold] #I:#W #[bg=#303446,fg=#8caaee,nobold] "

# Right: net speed + [powerline arrow ← mauve] clock
set -g status-right " #(~/.config/tmux/scripts/net_speed.sh)  #(~/.config/tmux/scripts/stats.sh) "
set -g status-right-length 80

set -g message-style "bg=#414559,fg=#c6d0f5"
set -g message-command-style "bg=#414559,fg=#c6d0f5"

# Bootstrap TPM if missing, then install all plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
run '~/.config/tmux/plugins/tpm/tpm'
